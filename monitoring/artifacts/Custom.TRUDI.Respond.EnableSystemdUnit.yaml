name: Custom.TRUDI.Respond.EnableSystemdUnit
description: |
  TRUDI remediation revert: re-enable a systemd unit previously disabled
  by DisableSystemdUnit.

type: CLIENT

parameters:
  - name: Unit
    type: string

sources:
  - query: |
      LET valid <= Unit =~ "^[A-Za-z0-9_@:.\\-]+\\.(service|timer|socket)$"
      SELECT
        Unit AS unit,
        if(condition=valid,
           then=execve(argv=["/bin/systemctl", "enable", "--now", Unit]),
           else=dict(stdout="", stderr="invalid systemd unit name", return_code=2)
        ) AS execution
      FROM scope()
