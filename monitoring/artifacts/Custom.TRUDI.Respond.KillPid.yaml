name: Custom.TRUDI.Respond.KillPid
description: |
  TRUDI remediation: send SIGKILL to a specific PID. Gated by respond.*
  approval workflow; never invoked directly by a detector.

type: CLIENT

parameters:
  - name: Pid
    description: PID to kill. Must be an integer > 1 (refuses init).
    type: int

sources:
  - query: |
      LET valid <= Pid > 1 AND Pid < 4194304
      SELECT
        Pid AS pid,
        valid AS valid_pid,
        if(condition=valid,
           then=execve(argv=["/bin/kill", "-9", format(format="%d", args=[Pid])]),
           else=dict(stdout="", stderr="invalid PID", return_code=2)
        ) AS execution
      FROM scope()
