name: Custom.TRUDI.Respond.PausePid
description: |
  TRUDI remediation: send SIGSTOP to a specific PID. Use for forensic
  capture before kill.

type: CLIENT

parameters:
  - name: Pid
    type: int

sources:
  - query: |
      LET valid <= Pid > 1 AND Pid < 4194304
      SELECT
        Pid AS pid,
        if(condition=valid,
           then=execve(argv=["/bin/kill", "-STOP", format(format="%d", args=[Pid])]),
           else=dict(stdout="", stderr="invalid PID", return_code=2)
        ) AS execution
      FROM scope()
